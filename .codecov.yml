coverage:
  precision: 2
  round: down
  range: "60...90"
  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error
      java:
        flags:
          - java
        target: auto
        threshold: 2%
    patch:
      default:
        target: 70%
        threshold: 5%

flags:
  java:
    paths:
      - backend/

ignore:
  - "backend/**/build/generated/**"
  - "backend/**/api/**"
  - "**/AppBahnApplication.java"
  - "**/OperatorApplication.java"
  - "backend/e2e/**"

comment:
  layout: "reach,diff,flags,files"
  behavior: default
  require_changes: false
