coverage:
  precision: 2
  round: down
  range: "60...90"
  status:
    project:
      default:
        target: auto
        threshold: 2%
        if_ci_failed: error
      java:
        flags:
          - java
        target: auto
        threshold: 2%
      java-e2e:
        # The e2e suite drives a real K3s cluster, so its coverage % naturally fluctuates with
        # what tests happen to run on a given branch (build pipelines, retention sweeps, image
        # pulls). 5% threshold gives the noise some headroom — the *combined* picture for the
        # `backend/` paths is what matters, and that's covered by the `java` flag's status.
        flags:
          - java-e2e
        target: auto
        threshold: 5%
      typescript:
        flags:
          - typescript
        target: auto
        threshold: 2%
      go:
        flags:
          - go
        target: auto
        threshold: 2%
    patch:
      default:
        target: 70%
        threshold: 5%

flags:
  java:
    paths:
      - backend/
  java-e2e:
    paths:
      - backend/
  typescript:
    paths:
      - web/src/
  go:
    paths:
      - cli/

ignore:
  - "backend/**/build/generated/**"
  - "backend/**/api/**"
  - "**/AppBahnApplication.java"
  - "**/OperatorApplication.java"
  - "backend/e2e/**"
  - "web/src/api/schema.ts"
  - "web/src/main.ts"
  - "web/src/env.d.ts"
  - "web/e2e/**"
  - "web/dist/**"
  - "cli/internal/api/**"

component_management:
  default_rules:
    statuses:
      - type: project
        target: auto
        threshold: 2%
  individual_components:
    - component_id: operator
      paths:
        - backend/operator/**
    - component_id: platform
      paths:
        - backend/platform/**
    - component_id: shared
      paths:
        - backend/shared/**
    - component_id: web
      paths:
        - web/src/**
    - component_id: cli
      paths:
        - cli/**

comment:
  layout: "reach,diff,flags,components,files"
  behavior: default
  require_changes: false
