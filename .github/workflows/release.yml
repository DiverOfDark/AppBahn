name: Release

# This workflow runs on the PUBLIC MIRROR repo (diverofdark/appbahn).
# It is triggered when the private repo's CI mirrors commits or tags here.
# It builds and publishes all artifacts: Docker images, Helm charts, GitHub Pages.

on:
  push:
    branches: [master]
    tags: ['v*']

jobs:
  build-frontend:
    if: github.repository == 'diverofdark/appbahn'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: web
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: web/package-lock.json
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: web/dist/

  publish-images:
    if: github.repository == 'diverofdark/appbahn'
    needs: [build-frontend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
      - uses: gradle/actions/setup-gradle@v6
      - uses: actions/download-artifact@v4
        with:
          name: web-dist
          path: backend/platform/app/src/main/resources/static/
      - name: Determine version
        id: version
        run: |
          if [[ "$GITHUB_REF" == refs/tags/v* ]]; then
            echo "semver=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
            echo "extra=latest" >> $GITHUB_OUTPUT
          else
            echo "semver=0.0.0-sha.${GITHUB_SHA::7}" >> $GITHUB_OUTPUT
            echo "extra=latest,master" >> $GITHUB_OUTPUT
          fi
      - name: Build and push Docker images
        run: |
          ./gradlew \
            :platform:app:bootBuildImage \
            :operator:bootBuildImage \
            -PdockerRegistry=ghcr.io/${{ github.repository_owner }} \
            -PdockerTag=${{ steps.version.outputs.semver }} \
            -PdockerExtraTags=${{ steps.version.outputs.extra }} \
            -PpublishImage \
            -PdockerUsername=${{ github.actor }} \
            -PdockerPassword=${{ secrets.GITHUB_TOKEN }}
      - uses: azure/setup-helm@v5
      - name: Push Helm chart
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ghcr.io -u ${{ github.actor }} --password-stdin
          OWNER=$(echo "${{ github.repository_owner }}" | tr '[:upper:]' '[:lower:]')
          VERSION="${{ steps.version.outputs.semver }}"
          helm package ../helm/appbahn --version "${VERSION}" --app-version "${VERSION}"
          helm push appbahn-${VERSION}.tgz oci://ghcr.io/${OWNER}/appbahn/charts

  publish-cli:
    if: github.repository == 'diverofdark/appbahn'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6
        with:
          go-version: "1.24"
          cache-dependency-path: cli/go.sum
      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser (release)
        if: startsWith(github.ref, 'refs/tags/v')
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - name: Run GoReleaser (snapshot)
        if: "!startsWith(github.ref, 'refs/tags/v')"
        uses: goreleaser/goreleaser-action@v7
        with:
          version: latest
          args: release --snapshot --clean
          workdir: cli
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  deploy-pages:
    if: github.repository == 'diverofdark/appbahn' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
      - name: Build website
        run: cd website && npm ci && npm run build
      - name: Build docs
        run: cd docs && npm ci && npm run build
      - name: Merge into site
        run: |
          mkdir -p site/docs
          cp -r website/dist/* site/
          cp -r docs/dist/* site/docs/
      - uses: actions/configure-pages@v6
      - uses: actions/upload-pages-artifact@v5
        with:
          path: site/
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
