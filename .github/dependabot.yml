version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      spring:
        patterns: ["org.springframework*"]
      kubernetes:
        patterns: ["io.fabric8*", "io.javaoperatorsdk*"]
      testing:
        patterns: ["org.testcontainers*", "org.junit*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
