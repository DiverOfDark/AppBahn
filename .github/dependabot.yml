version: 2
updates:
  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    groups:
      spring:
        patterns: ["org.springframework*"]
      kubernetes:
        patterns: ["io.fabric8*", "io.javaoperatorsdk*"]
      testing:
        patterns: ["org.testcontainers*", "org.junit*"]

  - package-ecosystem: "npm"
    directory: "/web"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    groups:
      vue:
        patterns: ["vue*", "@vue*", "pinia*"]
      tailwind:
        patterns: ["tailwindcss*", "@tailwindcss*"]

  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "npm"
    directory: "/docs"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3

  - package-ecosystem: "gomod"
    directory: "/cli"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
