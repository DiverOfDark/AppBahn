openapi: "3.1.0"
info:
  title: AppBahn Platform API
  description: Enterprise PaaS on your own Kubernetes infrastructure.
  version: 1.0.0
  license:
    name: ELv2
    url: https://www.elastic.co/licensing/elastic-license

servers:
  - url: /api/v1
    description: Platform API

security:
  - bearerAuth: []

tags:
  - name: workspaces
    description: Workspace management
  - name: projects
    description: Project management
  - name: environments
    description: Environment management
  - name: resources
    description: Resource management
  - name: resource-types
    description: Resource type catalog
  - name: git
    description: Git repository operations
  - name: webhooks
    description: Webhook receiver
  - name: admin
    description: Platform administration
paths:
  # ── Auth ─────────────────────────────────────────────────────────────────────
  /auth/login:
    get:
      tags: [auth]
      operationId: authLogin
      summary: Initiate OIDC login
      description: |
        Generates PKCE code verifier/challenge and state, then redirects
        the browser to the OIDC provider's authorization endpoint.
        No authentication required.
      security: []
      responses:
        "302":
          description: Redirect to OIDC authorization endpoint
          headers:
            Location:
              schema:
                type: string

  /auth/callback:
    get:
      tags: [auth]
      operationId: authCallback
      summary: OIDC callback
      description: |
        Receives the authorization code from the OIDC provider, exchanges
        it for tokens server-side, then redirects the browser to
        /auth/complete?token={access_token} for the SPA to pick up.
      security: []
      parameters:
        - name: code
          in: query
          required: true
          schema:
            type: string
        - name: state
          in: query
          required: true
          schema:
            type: string
      responses:
        "302":
          description: Redirect to SPA with token
          headers:
            Location:
              schema:
                type: string
        "400":
          $ref: '#/components/responses/BadRequest'

  # ── Workspaces ──────────────────────────────────────────────────────────────
  /workspaces:
    get:
      tags: [workspaces]
      operationId: listWorkspaces
      summary: List workspaces
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 0
        - name: size
          in: query
          schema:
            type: integer
            default: 20
        - name: sort
          in: query
          schema:
            type: string
      responses:
        "200":
          description: Paged list of workspaces
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PagedWorkspaceResponse'
        "401":
          $ref: '#/components/responses/Unauthorized'
    post:
      tags: [workspaces]
      operationId: createWorkspace
      summary: Create workspace
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateWorkspaceRequest'
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "409":
          $ref: '#/components/responses/Conflict'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'

  /workspaces/{slug}:
    get:
      tags: [workspaces]
      operationId: getWorkspace
      summary: Get workspace details
      parameters:
        - $ref: '#/components/parameters/SlugPath'
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
    patch:
      tags: [workspaces]
      operationId: updateWorkspace
      summary: Update workspace
      parameters:
        - $ref: '#/components/parameters/SlugPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateWorkspaceRequest'
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Workspace'
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "422":
          $ref: '#/components/responses/UnprocessableEntity'
    delete:
      tags: [workspaces]
      operationId: deleteWorkspace
      summary: Delete workspace
      parameters:
        - $ref: '#/components/parameters/SlugPath'
      responses:
        "204":
          description: Workspace deleted
        "401":
          $ref: '#/components/responses/Unauthorized'
        "403":
          $ref: '#/components/responses/Forbidden'
        "404":
          $ref: '#/components/responses/NotFound'
        "409":
          $ref: '#/components/responses/Conflict'

  /workspaces/{slug}/registry:
