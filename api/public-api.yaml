components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
    webhookSecret:
      type: apiKey
      in: header
      name: X-Webhook-Secret

  parameters:
    SlugPath:
      name: slug
      in: path
      required: true
      schema:
        type: string
    MetricsStart:
      name: start
      in: query
      description: Start time (ISO 8601 or relative e.g. -1h, -24h, -7d)
      schema:
        type: string
    MetricsEnd:
      name: end
      in: query
      description: End time (ISO 8601 or 'now')
      schema:
        type: string
    MetricsStep:
      name: step
      in: query
      description: Resolution in seconds
      schema:
        type: integer
    MetricsPod:
      name: pod
      in: query
      description: Filter by pod name
      schema:
        type: string

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Conflict:
      description: Conflict
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    UnprocessableEntity:
      description: Unprocessable entity
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    PaymentRequired:
      description: Resource limit reached
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    # ── Pagination Base ─────────────────────────────────────────────────────
    PagedResponse:
      type: object
      properties:
        page:
          type: integer
        size:
          type: integer
        totalElements:
          type: integer
          format: int64
        totalPages:
          type: integer

    # ── Error ─────────────────────────────────────────────────────────────────
    ErrorResponse:
      type: object
      required: [status, error, message]
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string
        current:
          type: integer
        limit:
          type: integer
        dimension:
          type: string
        level:
          type: string

    # ── Workspace ─────────────────────────────────────────────────────────────
    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        quota:
          $ref: '#/components/schemas/Quota'
        registry:
          $ref: '#/components/schemas/RegistryConfig'
        runtimeClassName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateWorkspaceRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string

    UpdateWorkspaceRequest:
      type: object
      properties:
        name:
          type: string

    PagedWorkspaceResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Workspace'

    # ── Project ───────────────────────────────────────────────────────────────
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        workspaceSlug:
          type: string
        quota:
          $ref: '#/components/schemas/Quota'
        registry:
          $ref: '#/components/schemas/RegistryConfig'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateProjectRequest:
      type: object
      required: [name, workspaceSlug]
      properties:
        name:
          type: string
        workspaceSlug:
          type: string

    UpdateProjectRequest:
      type: object
      properties:
        name:
          type: string

    PagedProjectResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Project'

    # ── Environment ───────────────────────────────────────────────────────────
    Environment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        projectSlug:
          type: string
        targetCluster:
          type: string
        approvalGates:
          $ref: '#/components/schemas/ApprovalGatesConfig'
        quota:
          $ref: '#/components/schemas/Quota'
        registry:
          $ref: '#/components/schemas/RegistryConfig'
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateEnvironmentRequest:
      type: object
      required: [name, projectSlug]
      properties:
        name:
          type: string
        projectSlug:
          type: string
        description:
          type: string
        targetCluster:
          type: string
          description: |
            Name of the target cluster. When omitted, the platform auto-picks
            the sole approved cluster; returns 400 if zero or more than one
            approved cluster is registered.
          minLength: 1
          maxLength: 63

    UpdateEnvironmentRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string

    PagedEnvironmentResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Environment'

    ApprovalGatesConfig:
      type: object
      properties:
        enabled:
          type: boolean
        requiredApprovals:
          type: integer

    SetTargetClusterRequest:
      type: object
      required: [clusterName]
      properties:
        clusterName:
          type: string

    # ── Environment Token ─────────────────────────────────────────────────────
    EnvironmentToken:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        role:
          type: string
          enum: [EDITOR, VIEWER]
        expiresAt:
          type: string
          format: date-time
        lastUsedAt:
          type: string
          format: date-time
        createdBy:
          type: string
          description: Email of the user who created the token
        createdAt:
          type: string
          format: date-time

    CreateEnvironmentTokenRequest:
      type: object
      required: [name, role, expiresInDays]
      properties:
        name:
          type: string
        role:
          type: string
          enum: [EDITOR, VIEWER]
        expiresInDays:
          type: integer

    CreateEnvironmentTokenResponse:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        token:
          type: string
        role:
          type: string
          enum: [EDITOR, VIEWER]
        expiresAt:
          type: string
          format: date-time

    # ── Resource ──────────────────────────────────────────────────────────────
    Resource:
      type: object
      properties:
        slug:
          type: string
        name:
          type: string
        type:
          type: string
        environmentSlug:
          type: string
        config:
          $ref: '#/components/schemas/ResourceConfig'
        links:
          type: array
          items:
            $ref: '#/components/schemas/LinkConfig'
        status:
          type: string
          enum: [PENDING, READY, RESTARTING, DEGRADED, ERROR, STOPPED]
        statusDetail:
          $ref: '#/components/schemas/ResourceStatusDetail'
        lastSyncedAt:
          type: string
          format: date-time
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    CreateResourceRequest:
      type: object
      required: [name, type, environmentSlug, config]
      properties:
        name:
          type: string
        type:
          type: string
        environmentSlug:
          type: string
        config:
          $ref: '#/components/schemas/ResourceConfig'
        links:
          type: array
          items:
            $ref: '#/components/schemas/LinkConfig'

    UpdateResourceRequest:
      type: object
      properties:
        name:
          type: string
        config:
          $ref: '#/components/schemas/ResourceConfig'
        links:
          type: array
          items:
            $ref: '#/components/schemas/LinkConfig'

    ResourceCreatedResponse:
      type: object
      properties:
        slug:
          type: string
        environmentSlug:
          type: string

    PagedResourceResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Resource'

    # ── Resource Config ───────────────────────────────────────────────────────
    ResourceConfig:
      type: object
      properties:
        source:
          $ref: '#/components/schemas/SourceConfig'
        hosting:
          $ref: '#/components/schemas/HostingConfig'
        networking:
          $ref: '#/components/schemas/NetworkingConfig'
        healthCheck:
          $ref: '#/components/schemas/HealthCheckConfig'
        env:
          type: object
          additionalProperties:
            type: string
        runMode:
          type: string
          enum: [continuous, cron]

    # ── Source Config (polymorphic) ──────────────────────────────────────────
    SourceConfig:
      oneOf:
        - $ref: '#/components/schemas/DockerSource'
        - $ref: '#/components/schemas/GitSource'
        - $ref: '#/components/schemas/PromotionSource'
      discriminator:
        propertyName: type
        mapping:
          docker: '#/components/schemas/DockerSource'
          git: '#/components/schemas/GitSource'
          promotion: '#/components/schemas/PromotionSource'

    SourceBase:
      type: object
      required: [type]
      properties:
        type:
          type: string
        pollInterval:
          type: string
          description: "Polling interval, e.g. '5m'. '0' disables polling."
        webhookEnabled:
          type: boolean

    DockerSource:
      allOf:
        - $ref: '#/components/schemas/SourceBase'
        - type: object
          required: [image]
          properties:
            image:
              type: string
            tag:
              type: string
            registryUrl:
              type: string
            credentialRef:
              type: string
              description: "ESO path for registry credentials"

    GitSource:
      allOf:
        - $ref: '#/components/schemas/SourceBase'
        - type: object
          required: [url, branch]
          properties:
            url:
              type: string
            branch:
              type: string
            path:
              type: string
              description: "Subdirectory within repo"
            auth:
              $ref: '#/components/schemas/SourceAuth'
            buildConfig:
              $ref: '#/components/schemas/BuildConfig'

    PromotionSource:
      allOf:
        - $ref: '#/components/schemas/SourceBase'
        - type: object
          required: [sourceEnvironment, sourceResource]
          properties:
            sourceEnvironment:
              type: string
              description: "Slug of the source environment"
            sourceResource:
              type: string
              description: "Slug of the source resource"
            autoPromote:
              type: boolean
              description: "Auto-trigger deployment on source success"

    SourceAuth:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [none, basic, ssh_key]
        credentialRef:
          type: string
          description: "ESO path for credentials"

    # ── Build Config (polymorphic) ────────────────────────────────────────
    BuildConfig:
      oneOf:
        - $ref: '#/components/schemas/PeelboxBuildConfig'
        - $ref: '#/components/schemas/BuildpackBuildConfig'
        - $ref: '#/components/schemas/RailpackBuildConfig'
        - $ref: '#/components/schemas/DockerfileBuildConfig'
      discriminator:
        propertyName: type
        mapping:
          peelbox: '#/components/schemas/PeelboxBuildConfig'
          buildpack: '#/components/schemas/BuildpackBuildConfig'
          railpack: '#/components/schemas/RailpackBuildConfig'
          dockerfile: '#/components/schemas/DockerfileBuildConfig'

    BuildConfigBase:
      type: object
      required: [type]
      properties:
        type:
          type: string

    PeelboxBuildConfig:
      allOf:
        - $ref: '#/components/schemas/BuildConfigBase'
        - type: object
          properties:
            universalBuild:
              type: array
              items:
                type: object

    BuildpackBuildConfig:
      allOf:
        - $ref: '#/components/schemas/BuildConfigBase'
        - type: object
          properties:
            builder:
              type: string
            buildVars:
              type: object
              additionalProperties:
                type: string

    RailpackBuildConfig:
      allOf:
        - $ref: '#/components/schemas/BuildConfigBase'
        - type: object
          properties:
            provider:
              type: string
            buildVars:
              type: object
              additionalProperties:
                type: string

    DockerfileBuildConfig:
      allOf:
        - $ref: '#/components/schemas/BuildConfigBase'
        - type: object
          properties:
            path:
              type: string
              description: "Path to Dockerfile relative to source root"
            target:
              type: string
              description: "Multi-stage build target"
            buildArgs:
              type: object
              additionalProperties:
                type: string

    HostingConfig:
      type: object
      properties:
        cpu:
          type: string
          description: "Kubernetes CPU quantity, e.g. '500m' or '2'"
        memory:
          type: string
          description: "Kubernetes memory quantity, e.g. '256Mi' or '1Gi'"
        minReplicas:
          type: integer
          description: "Minimum replicas (baseline count); used with maxReplicas for autoscaling"
        maxReplicas:
          type: integer
          description: "Maximum replicas for autoscaling; used for worst-case quota calculation"

    NetworkingConfig:
      type: object
      properties:
        ports:
          type: array
          items:
            $ref: '#/components/schemas/PortConfig'

    PortConfig:
      type: object
      properties:
        port:
          type: integer
        expose:
          type: string
          enum: [ingress, tcp, none]
        domain:
          type: string
          description: "Custom domain for this port (only when expose=ingress; auto-generated if omitted)"

    HealthCheckConfig:
      type: object
      properties:
        readiness:
          $ref: '#/components/schemas/ProbeConfig'
        liveness:
          $ref: '#/components/schemas/ProbeConfig'
        startup:
          $ref: '#/components/schemas/ProbeConfig'

    ProbeConfig:
      type: object
      properties:
        httpGet:
          $ref: '#/components/schemas/HttpGetAction'
        tcpSocket:
          $ref: '#/components/schemas/TcpSocketAction'
        exec:
          $ref: '#/components/schemas/ExecAction'
        initialDelaySeconds:
          type: integer
        periodSeconds:
          type: integer
        failureThreshold:
          type: integer

    HttpGetAction:
      type: object
      properties:
        path:
          type: string
        port:
          type: integer

    TcpSocketAction:
      type: object
      properties:
        port:
          type: integer

    ExecAction:
      type: object
      properties:
        command:
          type: array
          items:
            type: string

    LinkConfig:
      type: object
      required: [resource]
      properties:
        resource:
          type: string
        secret:
          type: string
        env:
          type: object
          additionalProperties:
            type: string

    ResourceStatusDetail:
      type: object
      properties:
        phase:
          type: string
        message:
          type: string
        observedGeneration:
          type: integer
          format: int64
        replicas:
          $ref: '#/components/schemas/ReplicaStatus'
        conditions:
          type: array
          items:
            $ref: '#/components/schemas/ResourceCondition'
        customDomains:
          type: array
          items:
            $ref: '#/components/schemas/CustomDomainStatus'
        links:
          type: array
          items:
            $ref: '#/components/schemas/LinkStatus'
        primaryDeploymentId:
          type: string
          format: uuid
        primaryImage:
          type: string
        lastDeploymentTime:
          type: string
          format: date-time
        lastSyncTime:
          type: string
          format: date-time
        latestDeploymentId:
          type: string
          format: uuid
        latestDeploymentStatus:
          type: string
          enum: [QUEUED, AWAITING_APPROVAL, BUILDING, COPYING_IMAGE, DEPLOYING, SUCCEEDED, FAILED, REJECTED]

    ReplicaStatus:
      type: object
      properties:
        desired:
          type: integer
        ready:
          type: integer
        updated:
          type: integer
        available:
          type: integer

    ResourceCondition:
      type: object
      properties:
        type:
          type: string
        status:
          type: string
        lastUpdateTime:
          type: string
          format: date-time
        reason:
          type: string
        message:
          type: string

    CustomDomainStatus:
      type: object
      properties:
        domain:
          type: string
        port:
          type: integer
        status:
          type: string
        dnsCname:
          type: string
        tlsIssuer:
          type: string
        tlsExpiresAt:
          type: string
          format: date-time

    LinkStatus:
      type: object
      properties:
        resource:
          type: string
        status:
          type: string
        lastSyncTime:
          type: string
          format: date-time

    # ── Deployment ────────────────────────────────────────────────────────────
    Deployment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        resourceSlug:
          type: string
        environmentSlug:
          type: string
        sourceRef:
          type: string
        imageRef:
          type: string
        triggeredBy:
          type: string
          enum: [manual, polling, webhook, auto-promotion, rollback]
        status:
          type: string
          enum: [QUEUED, AWAITING_APPROVAL, BUILDING, COPYING_IMAGE, DEPLOYING, SUCCEEDED, FAILED, REJECTED]
        isPrimary:
          type: boolean
        sourceDeploymentId:
          type: string
          format: uuid
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    TriggerDeploymentRequest:
      type: object
      properties:
        sourceRef:
          type: string

    TriggerDeploymentResponse:
      type: object
      required: [deploymentId, status]
      properties:
        deploymentId:
          type: string
          format: uuid
        status:
          type: string
          enum: [QUEUED, DEPLOYING, DUPLICATE]

    RollbackRequest:
      type: object
      required: [deploymentId]
      properties:
        deploymentId:
          type: string
          format: uuid

    PagedDeploymentResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/Deployment'

    DeploymentApproval:
      type: object
      properties:
        id:
          type: string
          format: uuid
        deploymentId:
          type: string
          format: uuid
        userId:
          type: string
          format: uuid
        decision:
          type: string
          enum: [APPROVED, REJECTED]
        updatedAt:
          type: string
          format: date-time

    # ── User ──────────────────────────────────────────────────────────────────
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
        oidcSubjectId:
          type: string

    PagedUserResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/User'

    # ── Workspace Member ──────────────────────────────────────────────────────
    WorkspaceMember:
      type: object
      properties:
        userId:
          type: string
          format: uuid
        email:
          type: string
        role:
          type: string
          enum: [OWNER, ADMIN, EDITOR, VIEWER]
        status:
          type: string
          enum: [active, pending]

    AddMemberRequest:
      type: object
      required: [email, role]
      properties:
        email:
          type: string
        role:
          type: string
          enum: [OWNER, ADMIN, EDITOR, VIEWER]

    AddMemberResponse:
      type: object
      properties:
        status:
          type: string
          enum: [active, pending]

    UpdateMemberRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [OWNER, ADMIN, EDITOR, VIEWER]

    # ── OIDC Group Mapping ────────────────────────────────────────────────────
    OidcGroupMapping:
      type: object
      properties:
        id:
          type: string
          format: uuid
        oidcGroup:
          type: string
        workspaceId:
          type: string
          format: uuid
        role:
          type: string
          enum: [OWNER, ADMIN, EDITOR, VIEWER]

    CreateGroupMappingRequest:
      type: object
      required: [oidcGroup, role]
      properties:
        oidcGroup:
          type: string
        role:
          type: string
          enum: [OWNER, ADMIN, EDITOR, VIEWER]

    UpdateGroupMappingRequest:
      type: object
      required: [role]
      properties:
        role:
          type: string
          enum: [OWNER, ADMIN, EDITOR, VIEWER]

    # ── Notification Webhook ──────────────────────────────────────────────────
    WebhookEvent:
      type: string
      description: Platform event a notification webhook may subscribe to.
      enum:
        - deployment.succeeded
        - deployment.failed
        - deployment.awaiting_approval
        - resource.error
        - resource.degraded
        - resource.ready
        - build.started
        - exposure.created
        - quota.warning

    NotificationWebhook:
      type: object
      properties:
        id:
          type: string
          format: uuid
        workspaceId:
          type: string
          format: uuid
        name:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEvent'
        createdBy:
          type: string
          format: uuid

    CreateNotificationWebhookRequest:
      type: object
      required: [name, url, events]
      properties:
        name:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEvent'

    UpdateNotificationWebhookRequest:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            $ref: '#/components/schemas/WebhookEvent'

    WebhookDelivery:
      type: object
      properties:
        id:
          type: string
          format: uuid
        webhookId:
          type: string
          format: uuid
        event:
          type: string
        status:
          type: string
        responseCode:
          type: integer
        createdAt:
          type: string
          format: date-time

    # ── Registry ──────────────────────────────────────────────────────────────
    RegistryConfig:
      type: object
      properties:
        url:
          type: string
        credentialRef:
          type: string

    # ── Quota ─────────────────────────────────────────────────────────────────
    Quota:
      type: object
      properties:
        maxCpuCores:
          type: number
          format: double
        maxMemoryMb:
          type: integer
        maxStorageGb:
          type: integer
        maxResources:
          type: integer
        maxDeploymentResources:
          type: integer
        maxDatabaseResources:
          type: integer

    # ── Security ──────────────────────────────────────────────────────────────
    SecuritySettings:
      type: object
      properties:
        runtimeClassName:
          type: string
          description: Kubernetes RuntimeClass name for pod isolation (e.g. "gvisor", "kata"). Null means default (runc).

    # ── Cluster ───────────────────────────────────────────────────────────────
    Cluster:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        kubeconfigSecret:
          type: string
        createdAt:
          type: string
          format: date-time

    CreateClusterRequest:
      type: object
      required: [name, kubeconfigSecret]
      properties:
        name:
          type: string
        description:
          type: string
        kubeconfigSecret:
          type: string

    UpdateClusterRequest:
      type: object
      properties:
        description:
          type: string

    # ── Network Policy ────────────────────────────────────────────────────────
    NetworkPolicy:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        workspaceId:
          type: string
          format: uuid
        policy:
          type: object

    CreateNetworkPolicyRequest:
      type: object
      required: [name, policy]
      properties:
        name:
          type: string
        description:
          type: string
        workspaceId:
          type: string
          format: uuid
        policy:
          type: object

    UpdateNetworkPolicyRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
        policy:
          type: object

    # ── Resource Type ─────────────────────────────────────────────────────────
    ResourceTypeDefinition:
      type: object
      properties:
        type:
          type: string
        definition:
          type: object
        adminConfig:
          type: object
        lastSyncedAt:
          type: string
          format: date-time

    UpdateResourceTypeAdminConfigRequest:
      type: object
      description: Admin configuration update for a resource type
      properties:
        storageClass:
          type: string
        labels:
          type: object
          additionalProperties:
            type: string
      additionalProperties: true

    ResourceTypeInfo:
      type: object
      properties:
        type:
          type: string
        displayName:
          type: string
        description:
          type: string
        category:
          type: string
          enum: [deployment, database, storage, messaging]
        configSchema:
          type: object
          additionalProperties: true
          description: JSON Schema describing the resource type configuration
        available:
          type: boolean

    # ── Audit Log ─────────────────────────────────────────────────────────────
    AuditAction:
      type: string
      description: Discrete platform mutation that may appear in the audit log.
      enum:
        - DEPLOYMENT_TRIGGERED
        - ENVIRONMENT_APPROVAL_GATES_UPDATED
        - ENVIRONMENT_CREATED
        - ENVIRONMENT_DELETED
        - ENVIRONMENT_QUOTA_UPDATED
        - ENVIRONMENT_REGISTRY_UPDATED
        - ENVIRONMENT_ROLE_OVERRIDE_REMOVED
        - ENVIRONMENT_ROLE_OVERRIDE_SET
        - ENVIRONMENT_TARGET_CLUSTER_UPDATED
        - ENVIRONMENT_TOKEN_CREATED
        - ENVIRONMENT_TOKEN_DELETED
        - ENVIRONMENT_UPDATED
        - GROUP_MAPPING_CREATED
        - GROUP_MAPPING_DELETED
        - GROUP_MAPPING_UPDATED
        - MEMBER_ADDED
        - MEMBER_INVITED
        - MEMBER_REMOVED
        - MEMBER_UPDATED
        - PROJECT_CREATED
        - PROJECT_DELETED
        - PROJECT_QUOTA_UPDATED
        - PROJECT_REGISTRY_UPDATED
        - PROJECT_ROLE_OVERRIDE_REMOVED
        - PROJECT_ROLE_OVERRIDE_SET
        - PROJECT_UPDATED
        - RESOURCE_CREATED
        - RESOURCE_DELETED
        - RESOURCE_RESTARTED
        - RESOURCE_STARTED
        - RESOURCE_STOPPED
        - RESOURCE_UPDATED
        - WORKSPACE_CREATED
        - WORKSPACE_DELETED
        - WORKSPACE_QUOTA_UPDATED
        - WORKSPACE_REGISTRY_UPDATED
        - WORKSPACE_SECURITY_UPDATED
        - WORKSPACE_UPDATED

    AuditTargetType:
      type: string
      description: Entity class the audit entry is attached to.
      enum:
        - WORKSPACE
        - PROJECT
        - ENVIRONMENT
        - RESOURCE
        - DEPLOYMENT

    AuditActorSource:
      type: string
      description: Channel through which the actor reached the platform.
      enum:
        - API
        - TOKEN
        - KUBECTL
        - SYSTEM

    AuditDecision:
      type: string
      description: Outcome of an admission-gated audit entry. API-path entries are always ALLOWED; kubectl-path entries carry the admission webhook's verdict.
      enum:
        - ALLOWED
        - DENIED

    AuditFieldChange:
      type: object
      description: Before/after value pair for a single audited field. Values are always rendered as strings for uniform presentation.
      required: [field]
      properties:
        field:
          type: string
        oldValue:
          type: string
          nullable: true
        newValue:
          type: string
          nullable: true

    AuditLogEntry:
      type: object
      properties:
        id:
          type: string
          format: uuid
        timestamp:
          type: string
          format: date-time
        actorId:
          type: string
          format: uuid
        actorEmail:
          type: string
        actorTokenId:
          type: string
          format: uuid
          nullable: true
        actorSource:
          $ref: '#/components/schemas/AuditActorSource'
        action:
          $ref: '#/components/schemas/AuditAction'
        targetType:
          $ref: '#/components/schemas/AuditTargetType'
        targetId:
          type: string
        workspaceId:
          type: string
          format: uuid
          nullable: true
        projectId:
          type: string
          format: uuid
          nullable: true
        environmentId:
          type: string
          format: uuid
          nullable: true
        decision:
          $ref: '#/components/schemas/AuditDecision'
        denialReason:
          type: string
          nullable: true
        changes:
          type: array
          description: Field-level before/after diffs, for mutations that track a named field change.
          items:
            $ref: '#/components/schemas/AuditFieldChange'
        details:
          type: object
          description: Flat key/value metadata specific to the action (e.g. invited email, granted role, token name).
          additionalProperties:
            type: string
        requestId:
          type: string

    PagedAuditLogResponse:
      allOf:
        - $ref: '#/components/schemas/PagedResponse'
        - type: object
          properties:
            content:
              type: array
              items:
                $ref: '#/components/schemas/AuditLogEntry'

    # ── Build Detection ───────────────────────────────────────────────────────
    BuildDetectionJob:
      type: object
      properties:
        jobId:
          type: string
          format: uuid
        status:
          type: string
          enum: [RUNNING, SUCCEEDED, FAILED]
        step:
          type: string
        message:
          type: string
        universalBuild:
          type: array
          items:
            type: object
        error:
          type: string

    DetectBuildRequest:
      type: object
      required: [url, branch]
      properties:
        url:
          type: string
        branch:
          type: string
        path:
          type: string
        auth:
          $ref: '#/components/schemas/GitAuth'

    BuildDetectionJobCreated:
      type: object
      properties:
        jobId:
          type: string
          format: uuid

    # ── Git ───────────────────────────────────────────────────────────────────
    GitAuthRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
        auth:
          $ref: '#/components/schemas/GitAuth'

    GitAuth:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [none, basic, ssh]
        username:
          type: string
        password:
          type: string
        privateKey:
          type: string

    GitRepo:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        defaultBranch:
          type: string

    ValidateGitRepoRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
        branch:
          type: string
        auth:
          $ref: '#/components/schemas/GitAuth'

    GitValidationResult:
      type: object
      properties:
        valid:
          type: boolean
        message:
          type: string
        branches:
          type: array
          items:
            type: string

    # ── Webhook ───────────────────────────────────────────────────────────────
    WebhookConfig:
      type: object
      properties:
        url:
          type: string
        secretMasked:
          type: string

    WebhookTriggerResponse:
      type: object
      properties:
        changed:
          type: boolean
        deploymentId:
          type: string
          format: uuid

    # ── Metrics ───────────────────────────────────────────────────────────────
    MetricsResponse:
      type: object
      properties:
        series:
          type: array
          items:
            $ref: '#/components/schemas/MetricsSeries'
        start:
          type: string
          format: date-time
        end:
          type: string
          format: date-time
        step:
          type: integer

    MetricsSeries:
      type: object
      properties:
        pod:
          type: string
        values:
          type: array
          items:
            type: array
            items:
              type: number

    # ── Logs ──────────────────────────────────────────────────────────────────
    LogResponse:
      type: object
      properties:
        lines:
          type: array
          items:
            $ref: '#/components/schemas/LogLine'

    LogLine:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        message:
          type: string
        pod:
          type: string
        container:
          type: string

    # ── Connection ────────────────────────────────────────────────────────────
    ConnectionResponse:
      type: object
      properties:
        entries:
          type: array
          items:
            $ref: '#/components/schemas/ConnectionEntry'

    ConnectionEntry:
      type: object
      properties:
        key:
          type: string
        value:
          type: string
        secret:
          type: boolean

    # ── Exposure ──────────────────────────────────────────────────────────────
    ResourceExposure:
      type: object
      properties:
        id:
          type: string
          format: uuid
        resourceSlug:
          type: string
        port:
          type: integer
        externalPort:
          type: integer
        expiresAt:
          type: string
          format: date-time
        createdBy:
          type: string
          format: uuid

    CreateExposureRequest:
      type: object
      required: [port, ttlMinutes]
      properties:
        port:
          type: integer
        ttlMinutes:
          type: integer

    # ── Domain ────────────────────────────────────────────────────────────────
    DomainEntry:
      type: object
      properties:
        domain:
          type: string
        port:
          type: integer
        status:
          type: string
          enum: [PENDING, ACTIVE, ERROR]

    AddDomainRequest:
      type: object
      required: [domain, port]
      properties:
        domain:
          type: string
        port:
          type: integer

    # ── Platform Config ───────────────────────────────────────────────────────
    PlatformConfig:
      type: object
      properties:
        domain:
          type: string
        namespacePrefix:
          type: string
          description: Kubernetes namespace prefix used for environments
          example: "abp"
        registry:
          $ref: '#/components/schemas/RegistryConfig'
        branding:
          type: object
          properties:
            instanceName:
              type: string
              description: Display name shown on login page
              example: "ACME Corp Platform"
            tagline:
              type: string
              description: Subtitle shown on login page
              example: "Deploy and manage your applications"
            logoUrl:
              type: string
              description: URL to company logo
              example: "https://acme.org/logo.svg"
            loginButtonText:
              type: string
              description: Text for the login button
              example: "Log in with SSO"
        auth:
          type: object
        defaultQuota:
          $ref: '#/components/schemas/Quota'
        buildConfig:
          type: object
