components:
  schemas:
    SecuritySettings:
      type: object
      properties:
        runtimeClassName:
          type: string
    CredentialRef:
      type: object
      properties:
        secretName:
          type: string
    RegistryConfig:
      type: object
      properties:
        url:
          type: string
        credentialRef:
          $ref: "#/components/schemas/CredentialRef"
    Quota:
      type: object
      properties:
        maxCpuCores:
          type: number
          format: double
        maxMemoryMb:
          type: integer
          format: int32
        maxStorageGb:
          type: integer
          format: int32
        maxResources:
          type: integer
          format: int32
    Workspace:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        quota:
          $ref: "#/components/schemas/Quota"
        registry:
          $ref: "#/components/schemas/RegistryConfig"
        runtimeClassName:
          type: string
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
        callerRole:
          type: string
          enum:
          - OWNER
          - ADMIN
          - EDITOR
          - VIEWER
    Project:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        workspaceSlug:
          type: string
        quota:
          $ref: "#/components/schemas/Quota"
        registry:
          $ref: "#/components/schemas/RegistryConfig"
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    UpdateMemberRequest:
      type: object
      properties:
        role:
          type: string
          enum:
          - OWNER
          - ADMIN
          - EDITOR
          - VIEWER
    SetTargetClusterRequest:
      required:
      - clusterName
      type: object
      properties:
        clusterName:
          type: string
    ApprovalGatesConfig:
      type: object
      properties:
        enabled:
          type: boolean
        requiredApprovals:
          type: integer
          format: int32
    Environment:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        slug:
          type: string
        description:
          type: string
        projectSlug:
          type: string
        targetCluster:
          type: string
        approvalGates:
          $ref: "#/components/schemas/ApprovalGatesConfig"
        quota:
          $ref: "#/components/schemas/Quota"
        registry:
          $ref: "#/components/schemas/RegistryConfig"
        aggregateStatus:
          type: string
          enum:
          - Failed
          - Degraded
          - Pending
          - Healthy
          - Unknown
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time
    PlatformConfig:
      type: object
      properties:
        domain:
          type: string
        namespacePrefix:
          type: string
        registry:
          $ref: "#/components/schemas/RegistryConfig"
        branding:
          $ref: "#/components/schemas/PlatformConfigBranding"
        auth:
          type: object
        defaultQuota:
          $ref: "#/components/schemas/Quota"
        buildConfig:
          type: object
        version:
          type: string
    PlatformConfigBranding:
      type: object
      properties:
        instanceName:
          type: string
        tagline:
          type: string
        logoUrl:
          type: string
        loginButtonText:
          type: string
    CreateWorkspaceRequest:
      required:
      - name
      type: object
      properties:
        name:
          type: string
    CreateNotificationWebhookRequest:
      type: object
      properties:
        name:
          type: string
        url:
          type: string
        events:
          type: array
          items:
            type: string
            enum:
            - DeploymentSucceeded
            - DeploymentFailed
            - DeploymentAwaitingApproval
            - ResourceError
            - ResourceDegraded
            - ResourceReady
            - BuildStarted
            - ExposureCreated
            - QuotaWarning
    NotificationWebhook:
      type: object
      properties:
