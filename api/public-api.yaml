  /projects/{slug}/members/{userId}/role:
    put:
      tags: [projects]
      operationId: setProjectMemberRole
      summary: Set project-level role override
      description: |
        Elevate a workspace member's role at the project level.
        The override role must be higher than the workspace role (can only elevate, never restrict).
      parameters:
        - $ref: '#/components/parameters/SlugPath'
        - name: userId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        required: true
        content:
