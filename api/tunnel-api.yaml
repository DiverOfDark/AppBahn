openapi: 3.0.1
info:
  title: AppBahn Operator Tunnel API
  description: Private operator ↔ platform transport. Unary REST + a single SSE stream
    (commands).
  version: 1.0.0
servers:
- url: /api/tunnel/v1
paths:
  /register:
    post:
      tags:
      - Tunnel
      operationId: registerCluster
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterClusterRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RegisterClusterAck"
  /goodbye:
    post:
      tags:
      - Tunnel
      operationId: goodbye
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/GoodbyeRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GoodbyeAck"
  /events:
    post:
      tags:
      - Tunnel
      operationId: pushEvents
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PushEventsRequest"
        required: true
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PushEventsAck"
  /commands/{correlationId}/ack:
    post:
      tags:
      - Tunnel
      operationId: ackCommand
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: correlationId
        in: path
        required: true
        schema:
          type: string
      requestBody:
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AckCommandRequest"
        required: true
      responses:
        "200":
          description: OK
  /commands:
    get:
      tags:
      - Tunnel
      operationId: subscribeCommands
      parameters:
      - name: Authorization
        in: header
        required: false
        schema:
          type: string
      - name: clusterName
        in: query
        required: true
        schema:
          type: string
      - name: operatorInstanceId
        in: query
        required: false
        schema:
          type: string
      - name: operatorVersion
        in: query
        required: false
        schema:
          type: string
      - name: lastAdminConfigRevision
        in: query
        required: false
        schema:
          type: integer
          format: int64
          default: 0
      - name: lastQuotaRbacRevision
        in: query
        required: false
        schema:
          type: integer
          format: int64
          default: 0
      responses:
        "200":
          description: OK
          content:
            text/event-stream:
              schema:
                $ref: "#/components/schemas/SseEmitter"
components:
  schemas:
    RegisterClusterRequest:
      required:
      - clusterName
      - publicKey
      type: object
      properties:
        clusterName:
          minLength: 1
          type: string
        publicKey:
          minLength: 1
          type: string
        operatorVersion:
          type: string
        operatorInstanceId:
          type: string
    RegisterClusterAck:
      type: object
      properties:
        clusterName:
          type: string
        status:
          type: string
        publicKeyFingerprint:
          type: string
    GoodbyeRequest:
      required:
      - clusterName
      type: object
      properties:
        clusterName:
          minLength: 1
          type: string
        sessionId:
          type: string
        reason:
          type: string
    GoodbyeAck:
      type: object
    ActiveRelease:
      type: object
      properties:
        sourceCommit:
          type: string
        imageRef:
          type: string
        activatedAt:
          type: string
          format: date-time
    AdmissionApproved:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          item:
            $ref: "#/components/schemas/ResourceSyncItem"
    AdmissionCacheMissReport:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          namespace:
            type: string
          userOidcSubject:
            type: string
          reason:
            type: string
    AuditAction:
      type: string
      enum:
      - DeploymentTriggered
      - EnvironmentApprovalGatesUpdated
      - EnvironmentCreated
      - EnvironmentDeleted
      - EnvironmentQuotaUpdated
      - EnvironmentRegistryUpdated
      - EnvironmentRoleOverrideRemoved
      - EnvironmentRoleOverrideSet
      - EnvironmentTargetClusterUpdated
      - EnvironmentTokenCreated
      - EnvironmentTokenDeleted
      - EnvironmentUpdated
      - GroupMappingCreated
      - GroupMappingDeleted
      - GroupMappingUpdated
      - MemberAdded
      - MemberInvited
      - MemberRemoved
      - MemberUpdated
      - ProjectCreated
      - ProjectDeleted
      - ProjectQuotaUpdated
      - ProjectRegistryUpdated
      - ProjectRoleOverrideRemoved
      - ProjectRoleOverrideSet
      - ProjectUpdated
      - ResourceCreated
      - ResourceDeleted
      - ResourceRestarted
      - ResourceStarted
      - ResourceStopped
      - ResourceUpdated
      - WorkspaceCreated
      - WorkspaceDeleted
      - WorkspaceQuotaUpdated
      - WorkspaceRegistryUpdated
      - WorkspaceSecurityUpdated
      - WorkspaceUpdated
    AuditActorSource:
      type: string
      enum:
      - Api
      - Token
      - Kubectl
      - System
    AuditDecision:
      type: string
      enum:
      - Allowed
      - Denied
    AuditFieldChange:
      type: object
      properties:
        field:
          type: string
        oldValue:
          type: string
        newValue:
          type: string
    AuditLogEvent:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          eventId:
            type: string
            format: uuid
          timestamp:
            type: string
            format: date-time
          actorId:
            type: string
            format: uuid
          actorEmail:
            type: string
          actorSource:
            $ref: "#/components/schemas/AuditActorSource"
          action:
            $ref: "#/components/schemas/AuditAction"
          targetType:
            $ref: "#/components/schemas/AuditTargetType"
          targetSlug:
            type: string
          decision:
            $ref: "#/components/schemas/AuditDecision"
          denialReason:
            type: string
          workspaceId:
            type: string
            format: uuid
          projectId:
            type: string
            format: uuid
          environmentId:
            type: string
            format: uuid
          changes:
            type: array
            items:
              $ref: "#/components/schemas/AuditFieldChange"
    AuditTargetType:
      type: string
      enum:
      - Workspace
      - Project
      - Environment
      - Resource
      - Deployment
    BuildLifecycleEvent:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          imageSourceName:
            type: string
          imageSourceNamespace:
            type: string
          deploymentId:
            type: string
          lifecycle:
            type: string
            enum:
            - Queued
            - Building
            - Built
            - Failed
            - Activating
            - Active
            - Superseded
            - Canceled
          sourceCommit:
            type: string
          imageRef:
            type: string
          errorMessage:
            type: string
          triggeredBy:
            type: string
            enum:
            - Manual
            - Polling
            - Webhook
            - AutoPromotion
            - Rollback
            - ManualRestart
            - EnvChange
            - Unpin
          occurredAt:
            type: string
            format: date-time
    BuildpackBuildOptions:
      type: object
      properties:
        builder:
          type: string
    CommandOverride:
      type: object
      properties:
        command:
          type: array
          items:
            type: string
        args:
          type: array
          items:
            type: string
    CustomDomainStatus:
      type: object
      properties:
        domain:
          type: string
        port:
          type: integer
          format: int32
        status:
          type: string
          enum:
          - Pending
          - Active
          - Error
        dnsCname:
          type: string
        tlsIssuer:
          type: string
        tlsExpiresAt:
          type: string
          format: date-time
    DeploymentStatusUpdate:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          deploymentId:
            type: string
          status:
            type: string
          message:
            type: string
    DockerfileBuildOptions:
      type: object
      properties:
        path:
          type: string
        context:
          type: string
    ExecAction:
      type: object
      properties:
        command:
          type: array
          items:
            type: string
    FieldsV1:
      type: object
    FullResourceSyncChunk:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          syncSessionId:
            type: string
          chunkIndex:
            type: integer
            format: int32
          items:
            type: array
            items:
              $ref: "#/components/schemas/ResourceSyncItem"
          complete:
            type: boolean
    HealthCheckConfig:
      type: object
      properties:
        readiness:
          $ref: "#/components/schemas/ProbeConfig"
        liveness:
          $ref: "#/components/schemas/ProbeConfig"
        startup:
          $ref: "#/components/schemas/ProbeConfig"
    HostingConfig:
      type: object
      properties:
        cpu:
          type: string
        memory:
          type: string
        minReplicas:
          type: integer
          format: int32
        maxReplicas:
          type: integer
          format: int32
    HttpGetAction:
      type: object
      properties:
        path:
          type: string
        port:
          type: integer
          format: int32
    ImageSourceBuildSpec:
      type: object
      properties:
        mode:
          type: string
          enum:
          - Dockerfile
          - Peelbox
          - Buildpack
          - Nixpacks
          - Railpack
        dockerfile:
          $ref: "#/components/schemas/DockerfileBuildOptions"
        buildpack:
          $ref: "#/components/schemas/BuildpackBuildOptions"
    ImageSourceCondition:
      type: object
      properties:
        type:
          type: string
        status:
          type: string
        reason:
          type: string
        message:
          type: string
        lastTransitionTime:
          type: string
          format: date-time
    ImageSourceCrd:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: "#/components/schemas/ObjectMeta"
        spec:
          $ref: "#/components/schemas/ImageSourceSpec"
        status:
          $ref: "#/components/schemas/ImageSourceStatus"
    ImageSourceDeletedBatch:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          imageSourceSlugs:
            type: array
            items:
              pattern: "^[a-z][a-z0-9-]{0,28}[a-z0-9]$"
              type: string
    ImageSourceGitSpec:
      type: object
      properties:
        repo:
          type: string
        branch:
          type: string
        credentialsSecretRef:
          type: string
    ImageSourcePoll:
      type: object
      properties:
        intervalSeconds:
          type: integer
          format: int32
        intervalSecondsAfterWebhook:
          type: integer
          format: int32
        webhookFreshnessSeconds:
          type: integer
          format: int32
    ImageSourcePromotionSpec:
      type: object
      properties:
        upstream:
          $ref: "#/components/schemas/ImageSourceUpstreamSpec"
        autoPromote:
          type: boolean
        pinnedDigest:
          type: string
    ImageSourceSpec:
      type: object
      properties:
        type:
          type: string
          enum:
          - Git
          - Image
          - ImageSource
        git:
          $ref: "#/components/schemas/ImageSourceGitSpec"
        image:
          $ref: "#/components/schemas/ImageSpec"
        imageSource:
          $ref: "#/components/schemas/ImageSourcePromotionSpec"
        build:
          $ref: "#/components/schemas/ImageSourceBuildSpec"
        trigger:
          $ref: "#/components/schemas/ImageSourceTrigger"
    ImageSourceStatus:
      type: object
      properties:
        observedCommit:
          type: string
        latestArtifact:
          $ref: "#/components/schemas/LatestArtifact"
        pendingBuild:
          $ref: "#/components/schemas/PendingBuild"
        queuedBuild:
          $ref: "#/components/schemas/PendingBuild"
        lastPollAt:
          type: string
          format: date-time
        lastWebhookAt:
          type: string
          format: date-time
        observedGeneration:
          type: integer
          format: int64
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/ImageSourceCondition"
    ImageSourceSyncBatch:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: "#/components/schemas/ImageSourceSyncItem"
    ImageSourceSyncItem:
      type: object
      properties:
        imageSource:
          $ref: "#/components/schemas/ImageSourceCrd"
        generation:
          type: integer
          format: int64
        resourceVersion:
          type: string
    ImageSourceTrigger:
      type: object
      properties:
        poll:
          $ref: "#/components/schemas/ImageSourcePoll"
    ImageSourceUpstreamSpec:
      type: object
      properties:
        cluster:
          type: string
        namespace:
          type: string
        name:
          type: string
    ImageSpec:
      type: object
      properties:
        ref:
          type: string
    LatestArtifact:
      type: object
      properties:
        sourceCommit:
          type: string
        imageRef:
          type: string
        builtAt:
          type: string
          format: date-time
    LinkConfig:
      type: object
      properties:
        resource:
          type: string
        secret:
          type: string
        env:
          type: object
          additionalProperties:
            type: string
    LinkStatus:
      type: object
      properties:
        resource:
          type: string
        status:
          type: string
        lastSyncTime:
          type: string
          format: date-time
    ManagedFieldsEntry:
      type: object
      properties:
        apiVersion:
          type: string
        fieldsType:
          type: string
        fieldsV1:
          $ref: "#/components/schemas/FieldsV1"
        manager:
          type: string
        operation:
          type: string
        subresource:
          type: string
        time:
          type: string
    NetworkingConfig:
      type: object
      properties:
        ports:
          type: array
          items:
            $ref: "#/components/schemas/PortConfig"
    ObjectMeta:
      type: object
      properties:
        annotations:
          type: object
          additionalProperties:
            type: string
        creationTimestamp:
          type: string
        deletionGracePeriodSeconds:
          type: integer
          format: int64
        deletionTimestamp:
          type: string
        finalizers:
          type: array
          items:
            type: string
        generateName:
          type: string
        generation:
          type: integer
          format: int64
        labels:
          type: object
          additionalProperties:
            type: string
        managedFields:
          type: array
          items:
            $ref: "#/components/schemas/ManagedFieldsEntry"
        name:
          type: string
        namespace:
          type: string
        ownerReferences:
          type: array
          items:
            $ref: "#/components/schemas/OwnerReference"
        resourceVersion:
          type: string
        selfLink:
          type: string
        uid:
          type: string
    OperatorEvent:
      type: object
      properties:
        type:
          type: string
      discriminator:
        propertyName: type
        mapping:
          resource-sync-batch: "#/components/schemas/ResourceSyncBatch"
          resource-deleted-batch: "#/components/schemas/ResourceDeletedBatch"
          full-resource-sync-chunk: "#/components/schemas/FullResourceSyncChunk"
          resource-type-sync-chunk: "#/components/schemas/ResourceTypeSyncChunk"
          deployment-status-update: "#/components/schemas/DeploymentStatusUpdate"
          admission-cache-miss-report: "#/components/schemas/AdmissionCacheMissReport"
          admission-approved: "#/components/schemas/AdmissionApproved"
          audit-log: "#/components/schemas/AuditLogEvent"
          image-source-sync-batch: "#/components/schemas/ImageSourceSyncBatch"
          image-source-deleted-batch: "#/components/schemas/ImageSourceDeletedBatch"
          build-lifecycle-event: "#/components/schemas/BuildLifecycleEvent"
    OwnerReference:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        blockOwnerDeletion:
          type: boolean
        controller:
          type: boolean
        name:
          type: string
        uid:
          type: string
    PendingBuild:
      type: object
      properties:
        sourceCommit:
          type: string
        lifecycle:
          type: string
          enum:
          - Queued
          - Building
          - Built
          - Failed
          - Activating
          - Active
          - Superseded
          - Canceled
        deploymentId:
          type: string
        jobName:
          type: string
        startedAt:
          type: string
          format: date-time
        errorMessage:
          type: string
    PinnedRelease:
      type: object
      properties:
        sourceCommit:
          type: string
        imageRef:
          type: string
        pinnedAt:
          type: string
          format: date-time
        pinnedFromDeploymentId:
          type: string
          format: uuid
    PortConfig:
      type: object
      properties:
        port:
          type: integer
          format: int32
        expose:
          type: string
          enum:
          - None
          - Ingress
          - Tcp
        domain:
          type: string
    ProbeConfig:
      type: object
      properties:
        httpGet:
          $ref: "#/components/schemas/HttpGetAction"
        tcpSocket:
          $ref: "#/components/schemas/TcpSocketAction"
        exec:
          $ref: "#/components/schemas/ExecAction"
        initialDelaySeconds:
          type: integer
          format: int32
        periodSeconds:
          type: integer
          format: int32
        failureThreshold:
          type: integer
          format: int32
    PushEventsRequest:
      required:
      - clusterName
      type: object
      properties:
        clusterName:
          minLength: 1
          type: string
        sessionId:
          type: string
        events:
          type: array
          items:
            $ref: "#/components/schemas/OperatorEvent"
    ReplicaStatus:
      type: object
      properties:
        desired:
          type: integer
          format: int32
        ready:
          type: integer
          format: int32
        updated:
          type: integer
          format: int32
        available:
          type: integer
          format: int32
    ResourceCondition:
      type: object
      properties:
        type:
          type: string
        status:
          type: string
        lastUpdateTime:
          type: string
          format: date-time
        reason:
          type: string
        message:
          type: string
    ResourceConfig:
      type: object
      properties:
        hosting:
          $ref: "#/components/schemas/HostingConfig"
        networking:
          $ref: "#/components/schemas/NetworkingConfig"
        healthCheck:
          $ref: "#/components/schemas/HealthCheckConfig"
        env:
          type: object
          additionalProperties:
            type: string
        runMode:
          type: string
          enum:
          - Continuous
          - Task
    ResourceCrd:
      type: object
      properties:
        apiVersion:
          type: string
        kind:
          type: string
        metadata:
          $ref: "#/components/schemas/ObjectMeta"
        spec:
          $ref: "#/components/schemas/ResourceSpec"
        status:
          $ref: "#/components/schemas/ResourceStatusDetail"
    ResourceDeletedBatch:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          resourceSlugs:
            type: array
            items:
              pattern: "^[a-z][a-z0-9-]{0,28}[a-z0-9]$"
              type: string
    ResourceSpec:
      type: object
      properties:
        type:
          type: string
        name:
          type: string
        environmentId:
          type: string
        projectId:
          type: string
        workspaceId:
          type: string
        config:
          $ref: "#/components/schemas/ResourceConfig"
        links:
          type: array
          items:
            $ref: "#/components/schemas/LinkConfig"
        stopped:
          type: boolean
        restartGeneration:
          type: integer
          format: int64
        pinnedRelease:
          $ref: "#/components/schemas/PinnedRelease"
        commandOverride:
          $ref: "#/components/schemas/CommandOverride"
    ResourceStatusDetail:
      type: object
      properties:
        phase:
          type: string
          enum:
          - Pending
          - Ready
          - Restarting
          - Degraded
          - Error
          - Stopped
        message:
          type: string
        observedGeneration:
          type: integer
          format: int64
        replicas:
          $ref: "#/components/schemas/ReplicaStatus"
        conditions:
          type: array
          items:
            $ref: "#/components/schemas/ResourceCondition"
        customDomains:
          type: array
          items:
            $ref: "#/components/schemas/CustomDomainStatus"
        links:
          type: array
          items:
            $ref: "#/components/schemas/LinkStatus"
        lastSyncTime:
          type: string
          format: date-time
        activeRelease:
          $ref: "#/components/schemas/ActiveRelease"
        observedReleaseId:
          type: string
        observedRestartGeneration:
          type: integer
          format: int64
        observedEnvHash:
          type: string
        observedPinnedImageRef:
          type: string
        rolloutStatus:
          type: string
          enum:
          - Pending
          - Deploying
          - Healthy
          - Degraded
          - Failed
        replicasReady:
          type: integer
          format: int32
        syncFailed:
          type: boolean
        lastError:
          type: string
    ResourceSyncBatch:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          items:
            type: array
            items:
              $ref: "#/components/schemas/ResourceSyncItem"
    ResourceSyncItem:
      type: object
      properties:
        resource:
          $ref: "#/components/schemas/ResourceCrd"
        generation:
          type: integer
          format: int64
        resourceVersion:
          type: string
    ResourceTypeSyncChunk:
      type: object
      allOf:
      - $ref: "#/components/schemas/OperatorEvent"
      - type: object
        properties:
          syncSessionId:
            type: string
          chunkIndex:
            type: integer
            format: int32
          availableTypes:
            type: array
            items:
              type: string
          complete:
            type: boolean
    TcpSocketAction:
      type: object
      properties:
        port:
          type: integer
          format: int32
    PushEventsAck:
      type: object
      properties:
        acceptedCount:
          type: integer
          format: int32
    AckCommandRequest:
      required:
      - response
      type: object
      properties:
        response:
          $ref: "#/components/schemas/CommandResponse"
    CommandResponse:
      type: object
      properties:
        status:
          type: string
          enum:
          - Ok
          - InvalidArgument
          - Conflict
          - NotFound
          - InternalError
          - Timeout
        message:
          type: string
    SseEmitter:
      type: object
      properties:
        timeout:
          type: integer
          format: int64
    AdminConfigPush:
      type: object
      properties:
        revision:
          type: integer
          format: int64
        snapshot:
          $ref: "#/components/schemas/AdminConfigSnapshot"
    AdminConfigSnapshot:
      type: object
      properties:
        baseDomain:
          type: string
        registryUrl:
          type: string
        registryRepositoryPrefix:
          type: string
        namespacePrefix:
          type: string
    EnvironmentEntry:
      type: object
      properties:
        slug:
          type: string
        namespace:
          type: string
        limits:
          $ref: "#/components/schemas/QuotaDimensions"
        current:
          $ref: "#/components/schemas/QuotaDimensions"
        allowedUserSubjects:
          type: array
          items:
            type: string
        allowedOidcGroups:
          type: array
          items:
            type: string
        projectSlug:
          type: string
        workspaceSlug:
          type: string
    HelloAck:
      type: object
      properties:
        sessionId:
          type: string
        adminConfig:
          $ref: "#/components/schemas/AdminConfigPush"
        quotaRbac:
          $ref: "#/components/schemas/QuotaRbacCachePush"
    ProjectEntry:
      type: object
      properties:
        slug:
          type: string
        workspaceSlug:
          type: string
        limits:
          $ref: "#/components/schemas/QuotaDimensions"
    QuotaDimensions:
      type: object
      properties:
        resources:
          type: integer
          format: int32
        cpuMillicores:
          type: integer
