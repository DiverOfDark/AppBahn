openapi: "3.1.0"
info:
  title: AppBahn Internal API
  description: Internal API for operator-to-platform communication. Authenticated via shared secret, not user-facing.
  version: 1.0.0
  license:
    name: ELv2
    url: https://www.elastic.co/licensing/elastic-license

servers:
  - url: /api/v1/internal
    description: Internal API

security:
  - internalToken: []

tags:
  - name: resource-sync
    description: Resource cache synchronization (operator → platform)

paths:
  /resource-sync:
    put:
      tags: [resource-sync]
      operationId: syncResource
      summary: Upsert resource spec + status into resource cache
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResourceSyncRequest'
      responses:
        "204":
          description: Resource synced
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

  /resource-sync/{slug}:
    delete:
      tags: [resource-sync]
      operationId: deleteResourceSync
      summary: Remove resource from resource cache (on CRD deletion)
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        "204":
          description: Resource removed from cache
        "401":
          $ref: '#/components/responses/Unauthorized'
        "404":
          $ref: '#/components/responses/NotFound'

  /resource-sync/full:
    post:
      tags: [resource-sync]
      operationId: fullResourceSync
      summary: Full reconciliation — replace all resources for a cluster
      description: |
        The operator sends the complete list of resources on its cluster.
        The platform compares with resource_cache and upserts/deletes accordingly.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/FullResourceSyncRequest'
      responses:
        "204":
          description: Full sync completed
        "400":
          $ref: '#/components/responses/BadRequest'
        "401":
          $ref: '#/components/responses/Unauthorized'

components:
  securitySchemes:
    internalToken:
      type: http
      scheme: bearer
      description: Shared secret or service account token configured on the operator

  responses:
    BadRequest:
      description: Bad request
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    Unauthorized:
      description: Unauthorized — missing or invalid internal auth token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
    NotFound:
      description: Not found
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'

  schemas:
    ErrorResponse:
      type: object
      required: [status, error, message]
      properties:
        status:
          type: integer
        error:
          type: string
        message:
          type: string
        details:
          type: array
          items:
            type: string

    ResourceSyncRequest:
      type: object
      required: [slug, environmentSlug, clusterName, name, type, config, status]
      properties:
        slug:
          type: string
        environmentSlug:
          type: string
        clusterName:
          type: string
        name:
          type: string
        type:
          type: string
        config:
          type: object
        status:
          type: string
        statusDetail:
          type: object

    FullResourceSyncRequest:
      type: object
      required: [clusterName, resources]
      properties:
        clusterName:
          type: string
        resources:
          type: array
          items:
            $ref: '#/components/schemas/ResourceSyncRequest'
