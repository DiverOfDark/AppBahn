server:
  port: 8080
  jetty:
    threads:
      max: 50

spring:
  # Disable async request timeout — the operator tunnel's SubscribeCommands stream is
  # long-lived (holds the HTTP response open to push commands). Default 30s timeout
  # would tear it down and operators would need to reconnect every 30s for nothing.
  mvc:
    async:
      request-timeout: -1
  threads:
    virtual:
      enabled: true
  application:
    name: appbahn-platform
  datasource:
    url: jdbc:postgresql://localhost:5432/appbahn
    username: appbahn
    password: appbahn
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:
      client:
        registration:
          appbahn:
            client-id:
            client-secret:
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/appbahn"
        provider:
          appbahn:
            issuer-uri:

springdoc:
  api-docs:
    path: /api/v1/openapi
    version: openapi_3_0
  swagger-ui:
    enabled: false

scalar:
  enabled: true
  path: /docs/api
  # Point Scalar at the public group's endpoint — tunnel spec is internal plumbing
  # and is published in parallel at /api/v1/openapi/tunnel.yaml.
  url: /api/v1/openapi/public
  pageTitle: AppBahn API Reference
  theme: default
  layout: modern

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  info:
    git:
      mode: full

platform:
  namespace-prefix: abp
  base-domain: appbahn.local
  admin-groups:
  kubernetes:
    enabled: true
  quota:
    default-max-resources: 50
    default-max-cpu-cores: 16.0
    default-max-memory-mb: 32768
  license:
    resource-limit: 5
  branding:
    instance-name: AppBahn
    tagline: Deploy and manage your applications
    logo-url:
    login-button-text: Log in with SSO
