server:
  port: 8080

spring:
  application:
    name: appbahn-platform
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri:
          audiences: appbahn
      client:
        registration:
          appbahn:
            client-id:
            client-secret:
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/appbahn"
        provider:
          appbahn:
            issuer-uri:

springdoc:
  api-docs:
    path: /api/v1/openapi
  swagger-ui:
    enabled: false

scalar:
  enabled: true
  path: /docs/api
  url: /api/v1/openapi
  pageTitle: AppBahn API Reference
  theme: default
  layout: modern

platform:
  namespace-prefix: abp
  base-domain: appbahn.local
  admin-groups:
  kubernetes:
    enabled: true
  quota:
    default-max-resources: 50
    default-max-cpu-cores: 16.0
    default-max-memory-mb: 32768
  license:
    resource-limit: 5
  branding:
    instance-name: AppBahn
    tagline: Deploy and manage your applications
    logo-url:
    login-button-text: Log in with SSO
