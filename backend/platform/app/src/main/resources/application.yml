server:
  port: 8080

spring:
  application:
    name: appbahn-platform
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OIDC_ISSUER_URI}
          audiences: ${OIDC_AUDIENCE:appbahn}
      client:
        registration:
          appbahn:
            client-id: ${OIDC_CLIENT_ID:}
            client-secret: ${OIDC_CLIENT_SECRET:}
            scope: openid,profile,email
            authorization-grant-type: authorization_code
            redirect-uri: "{baseUrl}/login/oauth2/code/appbahn"
        provider:
          appbahn:
            issuer-uri: ${OIDC_ISSUER_URI}

springdoc:
  api-docs:
    path: /api/v1/openapi
  swagger-ui:
    enabled: false

scalar:
  enabled: true
  path: /docs/api
  url: /api/v1/openapi
  pageTitle: AppBahn API Reference
  theme: default
  layout: modern

platform:
  namespace-prefix: ${NAMESPACE_PREFIX:abp}
  admin-groups: ${PLATFORM_ADMIN_GROUPS:}
  kubernetes:
    enabled: ${KUBERNETES_ENABLED:true}
  branding:
    instance-name: AppBahn
    tagline: Deploy and manage your applications
    logo-url: ""
    login-button-text: Log in with SSO
