server:
  port: 8080
  jetty:
    threads:
      max: 50

spring:
  application:
    name: appbahn-operator
  security:
    oauth2:
      client:
        registration:
          appbahn:
            client-id: appbahn-operator
            client-secret:
            authorization-grant-type: client_credentials
            scope: openid,internal
        provider:
          appbahn:
            token-uri:

operator:
  cluster-name: local
  ingress-class-name:
  cluster-issuer:
  resource-request-fraction: 0.25
  full-sync-interval-ms: 300000
  full-sync-initial-delay-ms: 60000
  security:
    run-as-non-root: true
    read-only-root-filesystem: true
    allow-privilege-escalation: false
    drop-capabilities: ALL

platform:
  api:
    base-url: http://localhost:8080

logging:
  level:
    org.springframework.security.oauth2.client: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
  info:
    git:
      mode: full
