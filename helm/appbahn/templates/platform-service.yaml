apiVersion: v1
kind: Service
metadata:
  name: {{ include "appbahn.fullname" . }}-platform
  labels:
    {{- include "appbahn.platform.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 80
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "appbahn.platform.selectorLabels" . | nindent 4 }}
