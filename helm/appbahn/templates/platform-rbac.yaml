apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "appbahn.fullname" . }}-platform
  labels:
    {{- include "appbahn.platform.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "appbahn.fullname" . }}-platform
  labels:
    {{- include "appbahn.platform.labels" . | nindent 4 }}
rules:
  # Read the operator's keypair Secret for tunnel auto-approval — same namespace as the
  # platform pod when running single-cluster.
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["appbahn-operator-key"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "appbahn.fullname" . }}-platform
  labels:
    {{- include "appbahn.platform.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ include "appbahn.fullname" . }}-platform
subjects:
  - kind: ServiceAccount
    name: {{ include "appbahn.fullname" . }}-platform
    namespace: {{ .Release.Namespace }}
