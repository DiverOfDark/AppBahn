{{- if .Values.serviceMonitor.enabled }}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "appbahn.fullname" . }}-platform
  labels:
    {{- include "appbahn.platform.labels" . | nindent 4 }}
spec:
  selector:
    matchLabels:
      {{- include "appbahn.platform.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: http
      path: /actuator/prometheus
      interval: 30s
{{- end }}
