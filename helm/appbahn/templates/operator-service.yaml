apiVersion: v1
kind: Service
metadata:
  name: {{ include "appbahn.fullname" . }}-operator
  labels:
    {{- include "appbahn.operator.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 8080
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "appbahn.operator.selectorLabels" . | nindent 4 }}
