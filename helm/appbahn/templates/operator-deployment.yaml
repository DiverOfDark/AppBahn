apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appbahn.fullname" . }}-operator
  labels:
    {{- include "appbahn.operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  selector:
    matchLabels:
      {{- include "appbahn.operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "appbahn.operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "appbahn.fullname" . }}-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: webhook
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name: webhook-tls
              mountPath: /etc/webhook/tls
              readOnly: true
          env:
            - name: PLATFORM_API_BASEURL
              value: {{ .Values.operator.platformApi.endpoint | default (printf "http://%s-platform:8080" (include "appbahn.fullname" .)) | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_APPBAHN_CLIENTID
              {{- if .Values.operator.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.operator.auth.existingSecret | quote }}
                  key: client-id
              {{- else }}
              value: {{ .Values.operator.auth.clientId | default "appbahn-operator" | quote }}
              {{- end }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_APPBAHN_CLIENTSECRET
              {{- if .Values.operator.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.operator.auth.existingSecret | quote }}
                  key: client-secret
              {{- else }}
              value: {{ .Values.operator.auth.clientSecret | quote }}
              {{- end }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_APPBAHN_TOKENURI
              value: {{ .Values.operator.auth.tokenEndpoint | quote }}
            - name: OPERATOR_CLUSTERNAME
              value: {{ .Values.operator.clusterName | quote }}
            {{- if .Values.operator.ingressClassName }}
            - name: OPERATOR_INGRESSCLASSNAME
              value: {{ .Values.operator.ingressClassName | quote }}
            {{- end }}
            {{- if .Values.operator.clusterIssuer }}
            - name: OPERATOR_CLUSTERISSUER
              value: {{ .Values.operator.clusterIssuer | quote }}
            {{- end }}
            - name: OPERATOR_RESOURCEREQUESTFRACTION
              value: {{ .Values.operator.resourceRequestFraction | quote }}
            - name: OPERATOR_FULLSYNCINTERVALMS
              value: {{ .Values.operator.fullSyncIntervalMs | quote }}
            - name: OPERATOR_FULLSYNCINITIALDELAYMS
              value: {{ .Values.operator.fullSyncInitialDelayMs | quote }}
            - name: OPERATOR_SECURITY_RUNASNONROOT
              value: {{ .Values.operator.security.runAsNonRoot | quote }}
            - name: OPERATOR_SECURITY_READONLYROOTFILESYSTEM
              value: {{ .Values.operator.security.readOnlyRootFilesystem | quote }}
            - name: OPERATOR_SECURITY_ALLOWPRIVILEGEESCALATION
              value: {{ .Values.operator.security.allowPrivilegeEscalation | quote }}
            - name: OPERATOR_SECURITY_DROPCAPABILITIES
              value: {{ .Values.operator.security.dropCapabilities | quote }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      volumes:
        - name: webhook-tls
          secret:
            secretName: {{ include "appbahn.fullname" . }}-webhook-tls
