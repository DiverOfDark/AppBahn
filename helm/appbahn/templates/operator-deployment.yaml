apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appbahn.fullname" . }}-operator
  labels:
    {{- include "appbahn.operator.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.operator.replicas }}
  revisionHistoryLimit: 1
  selector:
    matchLabels:
      {{- include "appbahn.operator.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        checksum/values: {{ toYaml .Values | sha256sum }}
      labels:
        {{- include "appbahn.operator.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "appbahn.fullname" . }}-operator
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: operator
          image: "{{ .Values.operator.image.repository }}:{{ .Values.operator.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.operator.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
            - name: webhook
              containerPort: 8443
              protocol: TCP
          volumeMounts:
            - name: webhook-tls
              mountPath: /etc/webhook/tls
              readOnly: true
          env:
            - name: OPERATOR_CLUSTERNAME
              value: {{ .Values.operator.clusterName | quote }}
            # Full platform origin (scheme + host[:port]). Defaults to the in-cluster Service.
            - name: OPERATOR_TUNNEL_PLATFORMBASEURL
              value: {{ .Values.operator.platformBaseUrl | default (printf "http://%s-platform" (include "appbahn.fullname" .)) | quote }}
            - name: OPERATOR_TUNNEL_CLUSTERNAME
              value: {{ .Values.operator.clusterName | quote }}
            {{- if .Values.operator.ingressClassName }}
            - name: OPERATOR_INGRESSCLASSNAME
              value: {{ .Values.operator.ingressClassName | quote }}
            {{- end }}
            {{- if .Values.operator.clusterIssuer }}
            - name: OPERATOR_CLUSTERISSUER
              value: {{ .Values.operator.clusterIssuer | quote }}
            {{- end }}
            - name: OPERATOR_RESOURCEREQUESTFRACTION
              value: {{ .Values.operator.resourceRequestFraction | quote }}
            - name: OPERATOR_FULLSYNCINTERVALMS
              value: {{ .Values.operator.fullSyncIntervalMs | quote }}
            - name: OPERATOR_FULLSYNCINITIALDELAYMS
              value: {{ .Values.operator.fullSyncInitialDelayMs | quote }}
            - name: OPERATOR_BUILD_REGISTRY
              value: {{ .Values.operator.build.registry | quote }}
            - name: OPERATOR_BUILD_REGISTRYINSECURE
              value: {{ .Values.operator.build.registryInsecure | quote }}
            {{- if .Values.operator.build.registryCredentialsSecret }}
            - name: OPERATOR_BUILD_REGISTRYCREDENTIALSSECRET
              value: {{ .Values.operator.build.registryCredentialsSecret | quote }}
            {{- end }}
            - name: OPERATOR_BUILD_GITCLONEIMAGE
              value: {{ .Values.operator.build.gitCloneImage | quote }}
            - name: OPERATOR_BUILD_ACTIVEDEADLINESECONDS
              value: {{ .Values.operator.build.activeDeadlineSeconds | quote }}
            - name: OPERATOR_BUILD_TTLSECONDSAFTERFINISHED
              value: {{ .Values.operator.build.ttlSecondsAfterFinished | quote }}
            {{- range $mode, $cfg := .Values.operator.build.builders }}
            - name: OPERATOR_BUILD_BUILDERS_{{ $mode | upper }}_IMAGE
              value: {{ $cfg.image | quote }}
            {{- if $cfg.entrypoint }}
            - name: OPERATOR_BUILD_BUILDERS_{{ $mode | upper }}_ENTRYPOINT
              value: {{ join "," $cfg.entrypoint | quote }}
            {{- end }}
            {{- end }}
            {{- with .Values.operator.extraEnv }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
            - name: OPERATOR_SECURITY_RUNASNONROOT
              value: {{ .Values.operator.security.runAsNonRoot | quote }}
            - name: OPERATOR_SECURITY_READONLYROOTFILESYSTEM
              value: {{ .Values.operator.security.readOnlyRootFilesystem | quote }}
            - name: OPERATOR_SECURITY_ALLOWPRIVILEGEESCALATION
              value: {{ .Values.operator.security.allowPrivilegeEscalation | quote }}
            - name: OPERATOR_SECURITY_DROPCAPABILITIES
              value: {{ .Values.operator.security.dropCapabilities | quote }}
          startupProbe:
            httpGet:
              path: /actuator/health
              port: http
            {{- toYaml .Values.operator.startupProbe | nindent 12 }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            {{- toYaml .Values.operator.livenessProbe | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            {{- toYaml .Values.operator.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.operator.resources | nindent 12 }}
      volumes:
        - name: webhook-tls
          secret:
            secretName: {{ include "appbahn.fullname" . }}-webhook-tls
