apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "appbahn.fullname" . }}-platform
  labels:
    {{- include "appbahn.platform.labels" . | nindent 4 }}
  {{- with .Values.platform.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  {{- if .Values.platform.ingress.className }}
  ingressClassName: {{ .Values.platform.ingress.className | quote }}
  {{- end }}
  {{- if .Values.platform.ingress.tls }}
  tls:
    - hosts:
        - {{ .Values.platform.domain.base | quote }}
      secretName: {{ include "appbahn.fullname" . }}-platform-tls
  {{- end }}
  rules:
    - host: {{ .Values.platform.domain.base | quote }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "appbahn.fullname" . }}-platform
                port:
                  name: http
