apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "appbahn.fullname" . }}-platform
  labels:
    {{- include "appbahn.platform.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.platform.replicas }}
  selector:
    matchLabels:
      {{- include "appbahn.platform.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "appbahn.platform.selectorLabels" . | nindent 8 }}
    spec:
      serviceAccountName: {{ include "appbahn.fullname" . }}-platform
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: platform
          image: "{{ .Values.platform.image.repository }}:{{ .Values.platform.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.platform.image.pullPolicy }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          ports:
            - name: http
              containerPort: 8080
              protocol: TCP
          env:
            # Database
            - name: SPRING_DATASOURCE_URL
              value: {{ .Values.platform.database.url | quote }}
            - name: SPRING_DATASOURCE_USERNAME
              value: {{ .Values.platform.database.username | quote }}
            - name: SPRING_DATASOURCE_PASSWORD
              value: {{ .Values.platform.database.password | quote }}
            # OIDC
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_ISSUERURI
              value: {{ .Values.platform.auth.issuerUrl | quote }}
            - name: SPRING_SECURITY_OAUTH2_RESOURCESERVER_JWT_AUDIENCES
              value: {{ .Values.platform.auth.audience | default "appbahn" | quote }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_APPBAHN_CLIENTID
              {{- if .Values.platform.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.platform.auth.existingSecret | quote }}
                  key: client-id
              {{- else }}
              value: {{ .Values.platform.auth.clientId | quote }}
              {{- end }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_REGISTRATION_APPBAHN_CLIENTSECRET
              {{- if .Values.platform.auth.existingSecret }}
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.platform.auth.existingSecret | quote }}
                  key: client-secret
              {{- else }}
              value: {{ .Values.platform.auth.clientSecret | quote }}
              {{- end }}
            - name: SPRING_SECURITY_OAUTH2_CLIENT_PROVIDER_APPBAHN_ISSUERURI
              value: {{ .Values.platform.auth.issuerUrl | quote }}
            # Platform config
            - name: PLATFORM_NAMESPACEPREFIX
              value: {{ .Values.platform.namespacePrefix | default "abp" | quote }}
            - name: PLATFORM_BASEDOMAIN
              value: {{ .Values.platform.domain.base | quote }}
            - name: PLATFORM_ADMINGROUPS
              value: {{ join "," .Values.platform.auth.platformAdminGroups | quote }}
            # Quota / License
            - name: PLATFORM_QUOTA_DEFAULTMAXRESOURCES
              value: {{ .Values.platform.quota.maxResources | quote }}
            - name: PLATFORM_QUOTA_DEFAULTMAXCPUCORES
              value: {{ .Values.platform.quota.maxCpuCores | quote }}
            - name: PLATFORM_QUOTA_DEFAULTMAXMEMORYMB
              value: {{ .Values.platform.quota.maxMemoryMb | quote }}
            - name: PLATFORM_LICENSE_RESOURCELIMIT
              value: {{ .Values.platform.license.resourceLimit | quote }}
            # Branding
            - name: PLATFORM_BRANDING_INSTANCENAME
              value: {{ .Values.platform.branding.instanceName | quote }}
            - name: PLATFORM_BRANDING_TAGLINE
              value: {{ .Values.platform.branding.tagline | quote }}
            {{- if .Values.platform.branding.logoUrl }}
            - name: PLATFORM_BRANDING_LOGOURL
              value: {{ .Values.platform.branding.logoUrl | quote }}
            {{- end }}
            - name: PLATFORM_BRANDING_LOGINBUTTONTEXT
              value: {{ .Values.platform.branding.loginButtonText | quote }}
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          resources:
            {{- toYaml .Values.platform.resources | nindent 12 }}
