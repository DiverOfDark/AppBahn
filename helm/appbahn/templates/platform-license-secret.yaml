{{- if and .Values.platform.licenseFile .Values.platform.licenseSecretName }}
{{- fail "platform.licenseFile and platform.licenseSecretName are mutually exclusive — set one or neither, not both." }}
{{- end }}
{{- if and .Values.platform.licenseFile (not .Values.platform.licenseSecretName) }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "appbahn.fullname" . }}-license
  labels:
    {{- include "appbahn.platform.labels" . | nindent 4 }}
type: Opaque
stringData:
  license.jws: |-
    {{- .Values.platform.licenseFile | nindent 4 }}
{{- end }}
