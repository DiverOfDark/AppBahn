platform:
  image:
    repository: ghcr.io/diverofdark/appbahn/platform
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  domain:
    base: "appbahn.example.com"
    apps: "appbahn.example.com"
  namespacePrefix: "abp"
  auth:
    issuerUrl: ""
    clientId: ""
    clientSecret: ""
    # Use an existing Secret instead of inline clientId/clientSecret.
    # The secret must contain keys: client-id, client-secret
    existingSecret: ""
    groupClaim: "groups"
    platformAdminGroups: []
  secretStore:
    name: ""
    kind: "ClusterSecretStore"
  registry:
    url: ""
    credentialRef: ""
    repositoryPrefix: "appbahn"
  database:
    url: "jdbc:postgresql://postgres:5432/appbahn"
    credentialRef: ""
    username: "appbahn"
    password: "appbahn"
  ingress:
    className: ""
    namespace: ""
    podLabels: {}
    annotations: {}
    # TLS is opt-in. Set `tls.secretName` to an existing Kubernetes Secret of type
    # kubernetes.io/tls in the release namespace — the chart references it from the
    # Ingress rule but does not create or manage the certificate itself (use cert-manager,
    # sealed-secrets, external-secrets, or an out-of-band provisioning step).
    tls:
      secretName: ""
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 60
    timeoutSeconds: 3
  livenessProbe:
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3
  readinessProbe:
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 3
  quota:
    maxResources: 50
    maxCpuCores: 16.0
    maxMemoryMb: 32768
  license:
    resourceLimit: 5
  branding:
    instanceName: "AppBahn"
    tagline: "Deploy and manage your applications"
    logoUrl: ""
    loginButtonText: "Log in with SSO"

operator:
  image:
    repository: ghcr.io/diverofdark/appbahn/operator
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  clusterName: "local"
  ingressClassName: ""
  clusterIssuer: ""
  resourceRequestFraction: 0.25
  fullSyncIntervalMs: 300000
  fullSyncInitialDelayMs: 60000
  security:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    dropCapabilities: "ALL"
    readOnlyRootFilesystem: false
  # Full platform origin (scheme://host[:port]). Leave blank in-cluster — the chart
  # derives http://<release>-platform. Set explicitly for cross-cluster installs, e.g.
  # "https://appbahn.acme.org".
  platformBaseUrl: ""
  cache:
    refreshInterval: "5m"
  # Additional env vars to inject into the operator container. Use for deployment-specific
  # tweaks that don't justify a first-class helm value (e.g. OIDC provider quirks).
  extraEnv: []
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 60
    timeoutSeconds: 3
  livenessProbe:
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3
  readinessProbe:
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 3

serviceMonitor:
  enabled: false

additionalObjects: []

builtinResourceTypes:
  - name: postgresql
    displayName: PostgreSQL
    description: "Managed PostgreSQL database (CloudNativePG)"
    icon: database
    discoveryCrd: clusters.postgresql.cnpg.io
    stoppable: true
    stopBehavior: scale-to-zero
  - name: s3-bucket
    displayName: S3 Bucket
    description: "S3-compatible object storage (Rook Ceph)"
    icon: hard-drive
    discoveryCrd: objectbucketclaims.objectbucket.io
    stoppable: false
    stopBehavior: not-supported
  - name: valkey
    displayName: Valkey
    description: "Managed Valkey in-memory store"
    icon: zap
    discoveryCrd: valkeys.valkey.io
    stoppable: true
    stopBehavior: scale-to-zero
  - name: mongodb
    displayName: MongoDB
    description: "Managed MongoDB database"
    icon: database
    discoveryCrd: mongodbcommunity.mongodbcommunity.mongodb.com
    stoppable: true
    stopBehavior: scale-to-zero
  - name: kafka
    displayName: Kafka
    description: "Managed Apache Kafka cluster (Strimzi)"
    icon: radio
    discoveryCrd: kafkas.kafka.strimzi.io
    stoppable: true
    stopBehavior: scale-to-zero
  - name: nats
    displayName: NATS
    description: "Managed NATS messaging"
    icon: send
    discoveryCrd: natsclusters.nats.io
    stoppable: true
    stopBehavior: scale-to-zero
