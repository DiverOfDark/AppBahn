platform:
  image:
    repository: ghcr.io/diverofdark/appbahn/platform
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  baseDomain: "appbahn.example.com"
  namespacePrefix: "abp"
  auth:
    issuerUrl: ""
    clientId: ""
    clientSecret: ""
    # Use an existing Secret instead of inline clientId/clientSecret.
    # The secret must contain keys: client-id, client-secret
    existingSecret: ""
    groupClaim: "groups"
    platformAdminGroups: []
  secretStore:
    name: ""
    kind: "ClusterSecretStore"
  registry:
    url: ""
    credentialRef: ""
    repositoryPrefix: "appbahn"
  database:
    url: "jdbc:postgresql://postgres:5432/appbahn"
    credentialRef: ""
    username: "appbahn"
    password: "appbahn"
  ingress:
    className: ""
    namespace: ""
    podLabels: {}
    annotations: {}
    # TLS is opt-in. Set `tls.secretName` to an existing Kubernetes Secret of type
    # kubernetes.io/tls in the release namespace — the chart references it from the
    # Ingress rule but does not create or manage the certificate itself (use cert-manager,
    # sealed-secrets, external-secrets, or an out-of-band provisioning step).
    tls:
      secretName: ""
  resources:
    requests:
      cpu: 500m
      memory: 512Mi
    limits:
      cpu: "2"
      memory: 1Gi
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 60
    timeoutSeconds: 3
  livenessProbe:
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3
  readinessProbe:
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 3
  quota:
    maxResources: 50
    maxCpuCores: 16.0
    maxMemoryMb: 32768
  # Optional Enterprise license. Two ways to provide it (mutually exclusive):
  #   licenseFile        — inline contents of a .jws file issued by AppBahn ops; the chart
  #                        renders a Secret and mounts it at /etc/appbahn/license.jws.
  #   licenseSecretName  — name of an EXISTING Secret in the release namespace with a key
  #                        `license.jws`. Use this when an out-of-band tool (External Secrets,
  #                        Sealed Secrets, sops, vault-agent, etc.) provisions the Secret —
  #                        keeps the license off `helm install`'s argv and out of values files.
  # Setting both is an error. Leaving both empty runs in community mode (hardcoded cap of 5).
  licenseFile: ""
  licenseSecretName: ""
  # Deployment audit-row retention. The `deployment` table grows unbounded otherwise — every
  # build, restart, env edit, promote, rollback, and unpin appends a row. The pruner keeps the
  # most recent `maxBuildsPerResource` terminal-state (SUPERSEDED / FAILED / CANCELED) rows per
  # Resource; in-flight rows and rows referenced by a Resource's `spec.pinnedRelease` are always
  # preserved regardless of age.
  deployment:
    retention:
      maxBuildsPerResource: 10
      enabled: true
      scheduleCron: "0 0 3 * * *"
  branding:
    instanceName: "AppBahn"
    tagline: "Deploy and manage your applications"
    logoUrl: ""
    loginButtonText: "Log in with SSO"
  # JaCoCo agent attach for e2e coverage. OFF by default. The e2e suite flips this on in
  # backend/e2e/values-e2e.yaml so its Spring tests can dump production-code coverage from the
  # platform/operator JVMs running inside K3s. Production deploys must leave this disabled — the
  # agent listens on a TCP port that has no auth and the host-path mount has no business existing
  # in a customer cluster.
  coverage:
    enabled: false
    # JaCoCo TCP-server port (RemoteControlReader/Writer protocol). Container-only; not exposed
    # outside the cluster.
    port: 6300
    # hostPath where the K3s container has the agent jar staged. The e2e bootstrap copies
    # jacocoagent.jar there before helm install; the pod mounts it read-only.
    agentHostPath: "/var/lib/rancher/k3s/jacocoagent.jar"
    # Patterns the agent should instrument. Matches the per-module JaCoCo reports' scope.
    includes: "eu.appbahn.*"

operator:
  image:
    repository: ghcr.io/diverofdark/appbahn/operator
    tag: ""
    pullPolicy: IfNotPresent
  replicas: 1
  clusterName: "local"
  ingressClassName: ""
  clusterIssuer: ""
  resourceRequestFraction: 0.25
  fullSyncIntervalMs: 300000
  fullSyncInitialDelayMs: 60000
  security:
    runAsNonRoot: true
    allowPrivilegeEscalation: false
    dropCapabilities: "ALL"
    readOnlyRootFilesystem: false
  # Full platform origin (scheme://host[:port]). Leave blank in-cluster — the chart
  # derives http://<release>-platform. Set explicitly for cross-cluster installs, e.g.
  # "https://appbahn.acme.org".
  platformBaseUrl: ""
  cache:
    refreshInterval: "5m"
  # Build infrastructure for ImageSource → Build Job pipelines. Each builder image is
  # helm-overridable so air-gapped installs can swap in mirrored copies. The default
  # peelbox image bundles Buildkit; the others delegate to upstream tooling.
  build:
    # Push target for built images. Cluster-internal in single-cluster installs;
    # cross-cluster setups expose a real registry (Harbor / ECR / GHCR).
    registry: "appbahn-registry.appbahn-system.svc:5000"
    # Whether the registry accepts plain HTTP (no TLS / no client cert). Disable for
    # production registries with valid TLS.
    registryInsecure: true
    # Optional: name of a Secret (in the *Build Job's* namespace) holding registry creds.
    # If unset, builds run anonymously — works for in-cluster registries only.
    registryCredentialsSecret: ""
    # Image used for the init container that clones source. Must include `git` and `sh`.
    gitCloneImage: "alpine/git:latest"
    # Hard cap on a single build run. K8s reaps the Job once exceeded.
    activeDeadlineSeconds: 3600
    # Job TTL after Complete/Failed. The reconciler reads terminal status before the TTL
    # fires; long enough to absorb operator restarts.
    ttlSecondsAfterFinished: 60
    builders:
      peelbox:
        image: "ghcr.io/peelbox/peelbox:0.6"
        entrypoint: []
      dockerfile:
        image: "moby/buildkit:rootless"
        entrypoint: []
      buildpack:
        image: "buildpacksio/pack:0.36"
        entrypoint: []
      nixpacks:
        image: "ghcr.io/railwayapp/nixpacks:latest"
        entrypoint: []
      railpack:
        image: "ghcr.io/railwayapp/railpack:latest"
        entrypoint: []
  # Additional env vars to inject into the operator container. Use for deployment-specific
  # tweaks that don't justify a first-class helm value (e.g. OIDC provider quirks).
  extraEnv: []
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  startupProbe:
    initialDelaySeconds: 10
    periodSeconds: 5
    failureThreshold: 60
    timeoutSeconds: 3
  livenessProbe:
    periodSeconds: 10
    failureThreshold: 3
    timeoutSeconds: 3
  readinessProbe:
    periodSeconds: 5
    failureThreshold: 3
    timeoutSeconds: 3
  # Same opt-in JaCoCo agent attach as platform.coverage. See platform.coverage for rationale.
  coverage:
    enabled: false
    port: 6300
    agentHostPath: "/var/lib/rancher/k3s/jacocoagent.jar"
    includes: "eu.appbahn.*"

serviceMonitor:
  enabled: false

additionalObjects: []

builtinResourceTypes:
  - name: postgresql
    displayName: PostgreSQL
    description: "Managed PostgreSQL database (CloudNativePG)"
    icon: database
    discoveryCrd: clusters.postgresql.cnpg.io
    stoppable: true
    stopBehavior: scale-to-zero
  - name: s3-bucket
    displayName: S3 Bucket
    description: "S3-compatible object storage (Rook Ceph)"
    icon: hard-drive
    discoveryCrd: objectbucketclaims.objectbucket.io
    stoppable: false
    stopBehavior: not-supported
  - name: valkey
    displayName: Valkey
    description: "Managed Valkey in-memory store"
    icon: zap
    discoveryCrd: valkeys.valkey.io
    stoppable: true
    stopBehavior: scale-to-zero
  - name: mongodb
    displayName: MongoDB
    description: "Managed MongoDB database"
    icon: database
    discoveryCrd: mongodbcommunity.mongodbcommunity.mongodb.com
    stoppable: true
    stopBehavior: scale-to-zero
  - name: kafka
    displayName: Kafka
    description: "Managed Apache Kafka cluster (Strimzi)"
    icon: radio
    discoveryCrd: kafkas.kafka.strimzi.io
    stoppable: true
    stopBehavior: scale-to-zero
  - name: nats
    displayName: NATS
    description: "Managed NATS messaging"
    icon: send
    discoveryCrd: natsclusters.nats.io
    stoppable: true
    stopBehavior: scale-to-zero
